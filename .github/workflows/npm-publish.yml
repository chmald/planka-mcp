name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Perform a dry run (no actual publish)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '22'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Validate tag version matches package version
        if: ${{ github.event_name == 'push' }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(npm pkg get version | tr -d '"')

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)."
            exit 1
          fi

          echo "✅ Tag version matches package version: $PKG_VERSION"

      - name: Verify package contents
        run: |
          echo "📦 Package contents:"
          npm pack --dry-run
          echo ""
          echo "📋 Package info:"
          npm pkg get name version description

      - name: Publish to npm (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run == true }}
        run: npm publish --access public --dry-run

      - name: Publish to npm
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry-run != true) }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log published version
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry-run != true) }}
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          echo "✅ Successfully published @chmald/planka-mcp@${VERSION} to npm"
          echo "📥 Install: npm install -g @chmald/planka-mcp"
          echo "🚀 Run: npx @chmald/planka-mcp"
